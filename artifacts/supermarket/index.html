<!DOCTYPE html>
<html lang="ar" dir="rtl" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover" />
    <title>Super Supermarché — إدارة ذكية للتجزئة</title>
    <meta name="description" content="Super Supermarché — نظام إدارة سوبرماركت متكامل: نقطة بيع، مخزون، فواتير، وطلبات أونلاين." />

    <!-- PWA core -->
    <link rel="manifest" href="manifest.webmanifest" />
    <meta name="theme-color" content="#10b981" />
    <meta name="application-name" content="Super Supermarché" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Super Supermarché" />
    <link rel="apple-touch-icon" href="logo.png" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="logo.png" />
    <link rel="icon" type="image/svg+xml" href="icon.svg" />

    <!-- Open Graph (WhatsApp / Facebook preview) -->
    <meta property="og:title" content="Super Supermarché" />
    <meta property="og:description" content="إدارة ذكية للتجزئة" />
    <meta property="og:image" content="logo.png" />
    <meta property="og:type" content="website" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script>
      (function() {
        var saved = localStorage.getItem("theme");
        if (saved === "light") {
          document.documentElement.classList.remove("dark");
        } else {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
